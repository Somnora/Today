name: Data Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-events:
    name: Validate bundled events
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate sample-data/events.json
        run: python3 .github/scripts/validate_events.py

      - name: Check widget slice freshness
        run: python3 .github/scripts/generate_widget_events.py --check

      - name: Validate runtime contracts
        run: python3 .github/scripts/validate_runtime_contracts.py
